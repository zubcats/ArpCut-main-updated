name: Build macOS installer (paid)

on:
  push:
    branches:
      - paid
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: macos-paid-installer-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos-paid:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore build.py and src/constants.py for CI
        shell: bash
        run: |
          cp .github/ci-blessed/constants.py src/constants.py
          cp .github/ci-blessed/build.py build.py

      - name: Apply paid-channel constants for this build
        shell: bash
        env:
          UPDATE_URL_STABLE: ${{ vars.UPDATE_DOWNLOAD_URL_STABLE }}
          UPDATE_URL_EXPERIMENTAL: ${{ vars.UPDATE_DOWNLOAD_URL_EXPERIMENTAL }}
          UPDATE_URL_PAID: ${{ vars.UPDATE_DOWNLOAD_URL_PAID }}
          PAID_LICENSE_PUBLIC_KEY_B64: ${{ secrets.PAID_LICENSE_PUBLIC_KEY_B64 }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re
          from datetime import datetime, timezone

          p = Path("src/constants.py")
          txt = p.read_text(encoding="utf-8")

          channel = "paid"
          stable_url = os.getenv("UPDATE_URL_STABLE", "")
          experimental_url = os.getenv("UPDATE_URL_EXPERIMENTAL", "")
          paid_url = os.getenv("UPDATE_URL_PAID", "")
          paid_pubkey = os.getenv("PAID_LICENSE_PUBLIC_KEY_B64", "").strip()

          txt = re.sub(r"^UPDATE_CHANNEL\s*=.*$", f"UPDATE_CHANNEL = '{channel}'", txt, flags=re.M)
          if stable_url:
              txt = re.sub(r"^UPDATE_DOWNLOAD_URL_STABLE\s*=.*$", f"UPDATE_DOWNLOAD_URL_STABLE = {stable_url!r}", txt, flags=re.M)
          if experimental_url:
              txt = re.sub(r"^UPDATE_DOWNLOAD_URL_EXPERIMENTAL\s*=.*$", f"UPDATE_DOWNLOAD_URL_EXPERIMENTAL = {experimental_url!r}", txt, flags=re.M)
          if paid_url:
              txt = re.sub(r"^UPDATE_DOWNLOAD_URL_PAID\s*=.*$", f"UPDATE_DOWNLOAD_URL_PAID = {paid_url!r}", txt, flags=re.M)
          if not paid_pubkey:
              raise SystemExit("Missing required secret PAID_LICENSE_PUBLIC_KEY_B64 for paid builds.")
          if paid_pubkey:
              txt = re.sub(r"^PAID_LICENSE_PUBLIC_KEY_B64\s*=.*$", f"PAID_LICENSE_PUBLIC_KEY_B64 = {paid_pubkey!r}", txt, flags=re.M)

          build_iso = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          txt = re.sub(r"^APP_BUILD_TIME_ISO\s*=.*$", f"APP_BUILD_TIME_ISO = {build_iso!r}", txt, flags=re.M)
          p.write_text(txt, encoding="utf-8")
          print(f"Applied UPDATE_CHANNEL={channel}")
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Verify Python syntax
        run: |
          python -m py_compile build.py
          python -m py_compile src/constants.py

      - name: Build macOS app (build.py)
        run: python build.py

      - name: Create paid macOS ZIP
        run: cd dist && zip -r ../ZubCut-macOS-paid.zip ZubCut.app

      - name: Upload macOS artifact (paid)
        uses: actions/upload-artifact@v4
        with:
          name: ZubCut-macOS-Paid
          path: ZubCut-macOS-paid.zip

      - name: Publish rolling paid macOS release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: paid-latest
          name: ZubCut (paid)
          prerelease: true
          make_latest: false
          files: ZubCut-macOS-paid.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
