# Windows installer only — does not run macOS/Linux (faster, fewer failure points).
# Use this if you only need the Windows setup .exe.
#
# After a successful run: Artifacts → ZubCut-Windows-Installer (zip).

name: Build Windows installer only

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # GitHub "edit file" uploads often destroy Python indentation; restore known-good copies.
      - name: Restore build.py and src/constants.py for CI
        shell: bash
        run: |
          cp .github/ci-blessed/constants.py src/constants.py
          cp .github/ci-blessed/build.py build.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Verify build script syntax
        run: python -m py_compile build.py

      - name: Build Windows EXE (PyInstaller via build.py)
        run: python build.py

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Compile Windows installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe" }
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found after Inno install" }
          & $iscc "installer\ZubCut.iss"

      - name: Upload portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: ZubCut-Windows-Portable
          path: dist/ZubCut.exe

      - name: Upload installer EXE
        uses: actions/upload-artifact@v4
        with:
          name: ZubCut-Windows-Installer
          path: output/ZubCut-Setup-*.exe
