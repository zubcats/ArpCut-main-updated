# Builds binaries in the cloud — no Python or Inno Setup on your PC.
#
# Triggers:
#   - Push to `main` → full matrix (Windows + macOS + Linux) as Actions artifacts (stable channel).
#   - Tag `v*` → same builds, plus the final job publishes a GitHub Release with those files.
#   - `workflow_dispatch` → manual run (pick release_channel if needed).
#
# Rolling Windows installer for stable is also built on every `main` push by
# "Build Windows installer only" (stable-latest). This workflow adds macOS/Linux
# and a second Windows artifact set for parity testing.

name: Build Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_channel:
        description: 'Build channel for artifacts/updater constants'
        required: false
        default: auto
        type: choice
        options:
          - auto
          - stable
          - experimental

concurrency:
  group: build-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore build.py and src/constants.py for CI
        shell: bash
        run: |
          cp .github/ci-blessed/constants.py src/constants.py
          cp .github/ci-blessed/build.py build.py

      - name: Apply update-channel constants for this branch
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          REQUESTED_CHANNEL: ${{ github.event.inputs.release_channel || '' }}
          UPDATE_URL_STABLE: ${{ vars.UPDATE_DOWNLOAD_URL_STABLE }}
          UPDATE_URL_EXPERIMENTAL: ${{ vars.UPDATE_DOWNLOAD_URL_EXPERIMENTAL }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re
          from datetime import datetime, timezone

          p = Path("src/constants.py")
          txt = p.read_text(encoding="utf-8")

          ref_name = os.getenv("REF_NAME", "").lower()
          ref_type = os.getenv("REF_TYPE", "").lower()
          requested = os.getenv("REQUESTED_CHANNEL", "").strip().lower()
          if requested in ("stable", "experimental"):
              channel = requested
          else:
              channel = "stable" if (ref_name == "main" or ref_type == "tag") else "experimental"
          stable_url = os.getenv("UPDATE_URL_STABLE", "")
          experimental_url = os.getenv("UPDATE_URL_EXPERIMENTAL", "")

          txt = re.sub(r"^UPDATE_CHANNEL\s*=.*$", f"UPDATE_CHANNEL = '{channel}'", txt, flags=re.M)
          if stable_url:
              txt = re.sub(r"^UPDATE_DOWNLOAD_URL_STABLE\s*=.*$", f"UPDATE_DOWNLOAD_URL_STABLE = {stable_url!r}", txt, flags=re.M)
          if experimental_url:
              txt = re.sub(r"^UPDATE_DOWNLOAD_URL_EXPERIMENTAL\s*=.*$", f"UPDATE_DOWNLOAD_URL_EXPERIMENTAL = {experimental_url!r}", txt, flags=re.M)
          build_iso = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          txt = re.sub(r"^APP_BUILD_TIME_ISO\s*=.*$", f"APP_BUILD_TIME_ISO = {build_iso!r}", txt, flags=re.M)
          p.write_text(txt, encoding="utf-8")
          print(f"Applied UPDATE_CHANNEL={channel} for ref={os.getenv('REF_NAME')}")
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Verify Python syntax
        run: |
          python -m py_compile build.py
          python -m py_compile src/constants.py

      - name: Refresh APP_BUILD_TIME_ISO before PyInstaller
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from datetime import datetime, timezone
          import re
          p = Path("src/constants.py")
          text = p.read_text(encoding="utf-8")
          build_iso = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          text = re.sub(
              r"^APP_BUILD_TIME_ISO\s*=.*$",
              f"APP_BUILD_TIME_ISO = {build_iso!r}",
              text,
              flags=re.M,
          )
          p.write_text(text, encoding="utf-8")
          print("Refreshed APP_BUILD_TIME_ISO to", build_iso)
          PY

      - name: Build Windows EXE (PyInstaller via build.py)
        run: python build.py

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Compile Windows installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe" }
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found after Inno install" }
          & $iscc "installer\ZubCut.iss"

      - name: Create channel installer alias
        shell: pwsh
        env:
          REQUESTED_CHANNEL: ${{ github.event.inputs.release_channel || '' }}
        run: |
          $requested = "$env:REQUESTED_CHANNEL".ToLower().Trim()
          if ($requested -eq "stable" -or $requested -eq "experimental") {
            $channel = $requested
          } elseif ("${{ github.ref_name }}" -eq "main" -or "${{ github.ref_type }}" -eq "tag") {
            $channel = "stable"
          } else {
            $channel = "experimental"
          }
          $latest = Get-ChildItem -Path "output" -Filter "ZubCut-Setup-*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $latest) { throw "Installer not found in output/" }
          $aliasName = if ($channel -eq "stable") { "ZubCut-Setup.exe" } else { "ZubCut-Setup-experimental.exe" }
          Copy-Item $latest.FullName ("output/" + $aliasName) -Force

      - name: Upload portable EXE
        if: ${{ github.event.inputs.release_channel == 'stable' || (github.event.inputs.release_channel != 'experimental' && (github.ref_name == 'main' || github.ref_type == 'tag')) }}
        uses: actions/upload-artifact@v4
        with:
          name: ZubCut-Windows-Portable
          path: dist/ZubCut

      - name: Upload portable EXE (Experimental)
        if: ${{ github.event.inputs.release_channel == 'experimental' || (github.event.inputs.release_channel != 'stable' && github.ref_name != 'main' && github.ref_type != 'tag') }}
        uses: actions/upload-artifact@v4
        with:
          name: ZubCut-Windows-Portable-Experimental
          path: dist/ZubCut

      - name: Upload installer EXE
        if: ${{ github.event.inputs.release_channel == 'stable' || (github.event.inputs.release_channel != 'experimental' && (github.ref_name == 'main' || github.ref_type == 'tag')) }}
        uses: actions/upload-artifact@v4
        with:
          name: ZubCut-Windows-Installer
          path: output/ZubCut-Setup.exe

      - name: Upload installer EXE (Experimental)
        if: ${{ github.event.inputs.release_channel == 'experimental' || (github.event.inputs.release_channel != 'stable' && github.ref_name != 'main' && github.ref_type != 'tag') }}
        uses: actions/upload-artifact@v4
        with:
          name: ZubCut-Windows-Installer-Experimental
          path: output/ZubCut-Setup-experimental.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore build.py and src/constants.py for CI
        shell: bash
        run: |
          cp .github/ci-blessed/constants.py src/constants.py
          cp .github/ci-blessed/build.py build.py

      - name: Apply update-channel constants for this branch
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          REQUESTED_CHANNEL: ${{ github.event.inputs.release_channel || '' }}
          UPDATE_URL_STABLE: ${{ vars.UPDATE_DOWNLOAD_URL_STABLE }}
          UPDATE_URL_EXPERIMENTAL: ${{ vars.UPDATE_DOWNLOAD_URL_EXPERIMENTAL }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re
          from datetime import datetime, timezone

          p = Path("src/constants.py")
          txt = p.read_text(encoding="utf-8")

          ref_name = os.getenv("REF_NAME", "").lower()
          ref_type = os.getenv("REF_TYPE", "").lower()
          requested = os.getenv("REQUESTED_CHANNEL", "").strip().lower()
          if requested in ("stable", "experimental"):
              channel = requested
          else:
              channel = "stable" if (ref_name == "main" or ref_type == "tag") else "experimental"
          stable_url = os.getenv("UPDATE_URL_STABLE", "")
          experimental_url = os.getenv("UPDATE_URL_EXPERIMENTAL", "")

          txt = re.sub(r"^UPDATE_CHANNEL\s*=.*$", f"UPDATE_CHANNEL = '{channel}'", txt, flags=re.M)
          if stable_url:
              txt = re.sub(r"^UPDATE_DOWNLOAD_URL_STABLE\s*=.*$", f"UPDATE_DOWNLOAD_URL_STABLE = {stable_url!r}", txt, flags=re.M)
          if experimental_url:
              txt = re.sub(r"^UPDATE_DOWNLOAD_URL_EXPERIMENTAL\s*=.*$", f"UPDATE_DOWNLOAD_URL_EXPERIMENTAL = {experimental_url!r}", txt, flags=re.M)
          build_iso = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          txt = re.sub(r"^APP_BUILD_TIME_ISO\s*=.*$", f"APP_BUILD_TIME_ISO = {build_iso!r}", txt, flags=re.M)
          p.write_text(txt, encoding="utf-8")
          print(f"Applied UPDATE_CHANNEL={channel} for ref={os.getenv('REF_NAME')}")
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Verify Python syntax
        run: |
          python -m py_compile build.py
          python -m py_compile src/constants.py

      - name: Build macOS app (build.py)
        run: python build.py

      - name: Create ZIP
        run: cd dist && zip -r ../ZubCut-macOS.zip ZubCut.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZubCut-macOS
          path: ZubCut-macOS.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore build.py and src/constants.py for CI
        shell: bash
        run: |
          cp .github/ci-blessed/constants.py src/constants.py
          cp .github/ci-blessed/build.py build.py

      - name: Apply update-channel constants for this branch
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          REQUESTED_CHANNEL: ${{ github.event.inputs.release_channel || '' }}
          UPDATE_URL_STABLE: ${{ vars.UPDATE_DOWNLOAD_URL_STABLE }}
          UPDATE_URL_EXPERIMENTAL: ${{ vars.UPDATE_DOWNLOAD_URL_EXPERIMENTAL }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re
          from datetime import datetime, timezone

          p = Path("src/constants.py")
          txt = p.read_text(encoding="utf-8")

          ref_name = os.getenv("REF_NAME", "").lower()
          ref_type = os.getenv("REF_TYPE", "").lower()
          requested = os.getenv("REQUESTED_CHANNEL", "").strip().lower()
          if requested in ("stable", "experimental"):
              channel = requested
          else:
              channel = "stable" if (ref_name == "main" or ref_type == "tag") else "experimental"
          stable_url = os.getenv("UPDATE_URL_STABLE", "")
          experimental_url = os.getenv("UPDATE_URL_EXPERIMENTAL", "")

          txt = re.sub(r"^UPDATE_CHANNEL\s*=.*$", f"UPDATE_CHANNEL = '{channel}'", txt, flags=re.M)
          if stable_url:
              txt = re.sub(r"^UPDATE_DOWNLOAD_URL_STABLE\s*=.*$", f"UPDATE_DOWNLOAD_URL_STABLE = {stable_url!r}", txt, flags=re.M)
          if experimental_url:
              txt = re.sub(r"^UPDATE_DOWNLOAD_URL_EXPERIMENTAL\s*=.*$", f"UPDATE_DOWNLOAD_URL_EXPERIMENTAL = {experimental_url!r}", txt, flags=re.M)
          build_iso = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          txt = re.sub(r"^APP_BUILD_TIME_ISO\s*=.*$", f"APP_BUILD_TIME_ISO = {build_iso!r}", txt, flags=re.M)
          p.write_text(txt, encoding="utf-8")
          print(f"Applied UPDATE_CHANNEL={channel} for ref={os.getenv('REF_NAME')}")
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-xinerama0 libxkbcommon-x11-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Verify Python syntax
        run: |
          python -m py_compile build.py
          python -m py_compile src/constants.py

      - name: Build Linux binary (build.py)
        run: python build.py

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZubCut-Linux
          path: dist/ZubCut

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/ZubCut-Windows-Installer/ZubCut-Setup.exe
            artifacts/ZubCut-Windows-Portable/ZubCut.exe
            artifacts/ZubCut-macOS/ZubCut-macOS.zip
            artifacts/ZubCut-Linux/ZubCut
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
