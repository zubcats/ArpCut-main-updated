# Builds binaries in the cloud — no Python or Inno Setup on your PC.
#
# Get the Windows INSTALLER:
#   1. Push this repo to GitHub (create a free account + new repository if needed).
#   2. Open the repo on GitHub → tab "Actions".
#   3. Click "Build Release" → "Run workflow" → Run workflow.
#   4. When it finishes (green), open that run → scroll to "Artifacts" →
#      download "ZubCut-Windows-Installer" (zip). Unzip once → double-click the .exe setup.
#
# Creating a version tag (e.g. v1.1.0) also runs this workflow and attaches files to a GitHub Release.

name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore build.py and src/constants.py for CI
        shell: bash
        run: |
          cp .github/ci-blessed/constants.py src/constants.py
          cp .github/ci-blessed/build.py build.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Verify Python syntax
        run: |
          python -m py_compile build.py
          python -m py_compile src/constants.py

      - name: Build Windows EXE (PyInstaller via build.py)
        run: python build.py

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Compile Windows installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe" }
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found after Inno install" }
          & $iscc "installer\ZubCut.iss"

      - name: Upload portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: ZubCut-Windows-Portable
          path: dist/ZubCut.exe

      - name: Upload installer EXE
        uses: actions/upload-artifact@v4
        with:
          name: ZubCut-Windows-Installer
          path: output/ZubCut-Setup-*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore build.py and src/constants.py for CI
        shell: bash
        run: |
          cp .github/ci-blessed/constants.py src/constants.py
          cp .github/ci-blessed/build.py build.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Verify Python syntax
        run: |
          python -m py_compile build.py
          python -m py_compile src/constants.py

      - name: Build macOS app (build.py)
        run: python build.py

      - name: Create ZIP
        run: cd dist && zip -r ../ZubCut-macOS.zip ZubCut.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZubCut-macOS
          path: ZubCut-macOS.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore build.py and src/constants.py for CI
        shell: bash
        run: |
          cp .github/ci-blessed/constants.py src/constants.py
          cp .github/ci-blessed/build.py build.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-xinerama0 libxkbcommon-x11-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Verify Python syntax
        run: |
          python -m py_compile build.py
          python -m py_compile src/constants.py

      - name: Build Linux binary (build.py)
        run: python build.py

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZubCut-Linux
          path: dist/ZubCut

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/ZubCut-Windows-Installer/ZubCut-Setup-*.exe
            artifacts/ZubCut-Windows-Portable/ZubCut.exe
            artifacts/ZubCut-macOS/ZubCut-macOS.zip
            artifacts/ZubCut-Linux/ZubCut
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
