# Windows installer only — does not run macOS/Linux (faster, fewer failure points).
# Use this if you only need the Windows setup .exe.
#
# After a successful run: Artifacts → ArpCutUpdated-Windows-Installer (zip).

name: Build Windows installer only

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Verify build script syntax
        run: |
          python -m py_compile build.py
          python -m py_compile src/constants.py

      - name: Build Windows EXE (PyInstaller via build.py)
        run: python build.py

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Compile Windows installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe" }
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found after Inno install" }
          & $iscc "installer\ArpCutUpdated.iss"

      - name: Upload portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: ArpCutUpdated-Windows-Portable
          path: dist/ArpCutUpdated.exe

      - name: Upload installer EXE
        uses: actions/upload-artifact@v4
        with:
          name: ArpCutUpdated-Windows-Installer
          path: output/ArpCutUpdated-Setup-*.exe
